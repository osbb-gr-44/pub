<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Video.js Hello!</title>
    
    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="/style.css">
    
    <!-- import the webpage's javascript file 
    <script src="/script.js" defer></script>-->
  </head>  
<body>
  <h1>Video.js Example Embed</h1>

  <video-js id="my_video_1" class="vjs-default-skin" controls preload="auto" width="640" height="268">
  </video-js>
 <!--   -->

  <script src="https://unpkg.com/video.js@7.8.4/dist/video.min.js"></script>
  <script src="https://unpkg.com/@videojs/http-streaming@2.2.1/dist/videojs-http-streaming.min.js"></script>
  <script src="videojs-plugin-concat.min.js"></script>
  
  <script>
  



  var player = videojs('my_video_1');
  player.concat({
  manifests: [{
    url: 'https://osbb-gr-44.github.io/pub/video/outbudni_osbb_z_ihorem_michudoyu__hist--olifer_serhiy/v.m3u8',
    mimeType: 'application/x-mpegURL',
  withCredentials: false
    
  }],
  targetVerticalResolution: 720,
  callback: (err, result) => {
    if (err) {
      console.error(err);
      return;
    }
    console.log(result);
    player.src({
      src: `data:application/vnd.videojs.vhs+json,${JSON.stringify(result.manifestObject)}`,
      type: 'application/vnd.videojs.vhs+json'
    });
  }
}); 

</script>
</body>
</html>

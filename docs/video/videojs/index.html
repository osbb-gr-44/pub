<html>
  <head prefix="og:http://ogp.me/ns#">
    <meta charset="utf-8" />
    <title>Budni Osbb Z Ihorem Michudoyu Hist Olifer Serhiy</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://osbb-gr-44.web.app/icons/svg/favicon.svg"
    />
    <meta property="og:type" content="video" />
    <meta property="og:video:type" content="application/x-mpegURL" />
    <meta property="og:video:width" content="480" />
    <meta property="og:video:height" content="270" />
    <meta name="twitter:card" content="player" />
    <meta name="twitter:player:width" content="480" />
    <meta name="twitter:player:height" content="270" />
    <link
      href="https://unpkg.com/video.js/dist/video-js.min.css"
      rel="stylesheet"
    />
    <style type="text/css">
      body,
      html {
        margin: 0;
        box-sizing: border-box;
        height: 100%;
      }
      body {
        min-width: 100%;
        max-width: 100%;
        display: inline-flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
      }
    </style>

    <link
      href="https://unpkg.com/video.js/dist/video-js.min.css"
      rel="stylesheet"
    />
    
    <script src="https://unpkg.com/video.js/dist/video.min.js"></script>
    <script src="https://unpkg.com/video.js/dist/lang/uk.js"></script>
    <script src="https://unpkg.com/videojs-contrib-hls/dist/videojs-contrib-hls.min.js"></script>
    <style type="text/css">
      .video-js .vjs-time-tooltip {
        top: -3.9em;
      }
      .video-js .vjs-control:focus,
      .video-js .vjs-control:focus:before,
      .video-js .vjs-control:hover:before {
        text-shadow: 0 0 0em #fff;
      }
      .vjs-menu li.vjs-menu-item:focus,
      .vjs-menu li.vjs-menu-item:hover {
        outline: none;
      }
      .video-js.vjs-fullscreen {
        font-size: 18px;
      }
      .video-js button {
        outline: none;
      }
      .video-js .vjs-controls-disabled .vjs-big-play-button {
        display: none !important;
      }
      .vjs-paused.vjs-has-started.video-js .vjs-big-play-button,
      .video-js.vjs-ended .vjs-big-play-button,
      .video-js.vjs-paused .vjs-big-play-button {
        display: block;
      }
      .video-js .vjs-load-progress div,
      .vjs-seeking .vjs-big-play-button,
      .vjs-waiting .vjs-big-play-button {
        display: none !important;
      }
      .video-js.vjs-ended .vjs-big-play-button {
        display: block !important;
      }
      .video-js .vjs-big-play-button {
        top: 50%;
        left: 50%;
        margin-left: -1em;
        margin-top: -1em;
        width: 2em;
        height: 2em;
        line-height: 2em;
        border: none;
        border-radius: 50%;
        font-size: 3.5em;
        background-color: rgba(0, 0, 0, 0.45);
        color: #fff;
        -webkit-transition: border-color 0.4s, outline 0.4s,
          background-color 0.4s;
        -moz-transition: border-color 0.4s, outline 0.4s, background-color 0.4s;
        -ms-transition: border-color 0.4s, outline 0.4s, background-color 0.4s;
        -o-transition: border-color 0.4s, outline 0.4s, background-color 0.4s;
        transition: border-color 0.4s, outline 0.4s, background-color 0.4s;
      }
      .video-js .vjs-big-play-button {
        background-color: rgba(0, 0, 0, 0);
        font-size: 12em;
        border-radius: 0%;
        height: 1em !important;
        line-height: 1em !important;
        margin-top: -0.5em !important;
      }
      .video-js:hover .vjs-big-play-button,
      .video-js .vjs-big-play-button:focus,
      .video-js .vjs-big-play-button:active {
        background-color: rgba(0, 0, 0, 0);
      }
      .video-js .vjs-remaining-time-display {
        display: none;
      }
      .video-js .vjs-duration {
        display: block;
        left: 0em;
      }
      .video-js .vjs-current-time {
        display: block;
        left: 0;
      }
      .vjs-live .vjs-time-control {
        display: none;
      }
    </style>
  </head>
  <body>
    <div
      style="
        min-width: 70%;
        width: 70%;
        display: inline-flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
      "
    >
      <video-js id="my_video_1"> </video-js>
    </div>

    <script>
      var opt = 0
      try {
        opt = JSON.parse(atob(window.location.hash.substring(1).trim()))
      } catch {}
      if (opt && opt.m3u8) {
        window.document.title = opt.t
        var player = videojs('my_video_1', {
          controls: true,
          autoplay: false,
          preload: 'auto',
          poster: opt.p,
          width: 480,
          height: 270
        })

        player.src({
          src: opt.m3u8,
          type: 'application/x-mpegURL',
          withCredentials: false
        })
        player.ready(function () {
          player.volume(0.3)
          console.log(player.volume(), player)
        })
      }
    </script>
  </body>
</html>

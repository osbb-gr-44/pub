<html>
  <head prefix="og:http://ogp.me/ns#">
    <meta charset="utf-8" />
    <title>Budni Osbb Z Ihorem Michudoyu Hist Olifer Serhiy</title>
    <meta property="og:type" content="video" />
    <meta property="og:video:type" content="application/x-mpegURL" />
    <meta property="og:video:width" content="480" />
    <meta property="og:video:height" content="270" />
    <meta name="twitter:card" content="player" />
    <meta name="twitter:player:width" content="480" />
    <meta name="twitter:player:height" content="270" />
    <link
      href="https://unpkg.com/video.js@7.8.4/dist/video-js.min.css"
      rel="stylesheet"
    />
    <style type="text/css">
      body,
      html {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        min-width: 100%;
        max-width: 100%;
        display: inline-flex;
        justify-content: center;
        max-height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      style="min-width: 70%;width: 70%;display: inline-flex;justify-content: center;"
    >
      <video-js
        id="my_video_1"
        tabindex="-1"
        disableremoteplayback=""
        webkit-playsinline=""
        playsinline=""
        controls
        preload="auto"
        width="480"
        height="270"
      >
      </video-js>
    </div>
    <script src="https://unpkg.com/video.js@7.8.4/dist/video.min.js"></script>
    <script src="https://unpkg.com/@videojs/http-streaming@2.2.1/dist/videojs-http-streaming.min.js"></script>
    <script src="videojs-plugin-concat.min.js"></script>
    <script>
      var opt = 0
      try {
        opt = JSON.parse(atob(window.location.hash.substring(1).trim()))
      } catch {}
      if (opt && opt.m3u8) {
        window.document.title = opt.t
        var player = videojs('my_video_1')
        player.concat({
          manifests: [
            {
              url: opt.m3u8,
              mimeType: 'application/x-mpegURL',
              withCredentials: false
            }
          ],
          targetVerticalResolution: 720,
          callback: (err, result) => {
            if (err) {
              console.error(err)
              return
            }
            console.log(result)
            player.src({
              src: `data:application/vnd.videojs.vhs+json,${JSON.stringify(
                result.manifestObject
              )}`,
              type: 'application/vnd.videojs.vhs+json'
            })
          }
        })
      }
    </script>
  </body>
</html>
